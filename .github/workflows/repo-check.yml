name: Repository Checks

on:
  push:
  pull_request:

jobs:
  policy-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run repository policy checks
        run: python scripts/repo_check.py

      - name: Set up Go
        if: ${{ hashFiles('**/*.go') != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Go tests
        if: ${{ hashFiles('go-app/*.go') != '' }}
        working-directory: go-app
        run: |
          go mod download
          go mod tidy
          go test ./...

      - name: Set up Rust
        if: ${{ hashFiles('rust-app/Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo tests
        if: ${{ hashFiles('rust-app/Cargo.toml') != '' }}
        working-directory: rust-app
        run: cargo test --all --all-features -- --test-threads=1

      - name: Install Python test dependencies
        if: ${{ hashFiles('python-app/test_*.py') != '' || hashFiles('python-app/*_test.py') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi uvicorn flask requests psutil

      - name: Pytest
        if: ${{ hashFiles('python-app/test_*.py') != '' || hashFiles('python-app/*_test.py') != '' }}
        working-directory: python-app
        run: pytest -q

