name: Repository Checks

on:
  push:
  pull_request:

jobs:
  policy-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run repository policy checks
        run: python scripts/repo_check.py

      - name: Set up Go
        if: ${{ hashFiles('**/*.go') != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Go tests
        if: ${{ hashFiles('go_logging/server/**/*.go') != '' }}
        working-directory: go_logging/server
        run: |
          go mod download
          go test ./...

      - name: Set up Rust
        if: ${{ hashFiles('**/Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo tests
        if: ${{ hashFiles('**/Cargo.toml') != '' }}
        run: cargo test --all --all-features

      - name: Install Python test dependencies
        if: ${{ hashFiles('**/pyproject.toml') != '' || hashFiles('**/pytest.ini') != '' || hashFiles('**/test_*.py') != '' || hashFiles('**/*_test.py') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi uvicorn

      - name: Pytest
        if: ${{ hashFiles('**/pyproject.toml') != '' || hashFiles('**/pytest.ini') != '' || hashFiles('**/test_*.py') != '' || hashFiles('**/*_test.py') != '' }}
        run: pytest -q

